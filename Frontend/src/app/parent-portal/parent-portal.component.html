<section>
    <div class="login-box">
        <form action="">
            <h2>Login</h2>
            <div class="input-box">
                <span class="icon">
                    <i class="fa-solid fa-envelope"></i>

                </span>
                <input type="email" [(ngModel)]="email" class="input-box" id="email" placeholder="enter email">
                <label>Email</label>
            </div>
            <div class="input-box">
                <span class="icon">
                    <i class="fa-solid fa-lock"></i>
                </span>
                <input type="password" [(ngModel)]="password" class="input-box" id="email" placeholder="enter password">
                <label>Password</label>
            </div>
            <div class="remember-forgot">
                <label><input type="checkbox">Remember me</label>
                <a routerLink="/">Forget Password</a>
            </div>
            <button type="submit" class="btn btn-primary" (click)="login()">Login</button>
            <div class="register-link">
                <p>Don't have an account?<a routerLink="/register"> Register</a></p>
            </div>
        </form>
    </div>
</section>
